# config/dnsmasq.conf
# Secure binding
listen-address=127.0.0.1,192.168.56.10

# DNS Settings
domain=sandbox.lan
local=/sandbox.lan/
host-record=router.sandbox.lan,192.168.56.1
host-record=server.sandbox.lan,192.168.56.10

# Upstream DNS Forwarders (Cisco Umbrella & Cloudflare)
server=208.67.222.222
server=1.1.1.1

# DHCP Settings (Simulated range for the internal sandbox network)
dhcp-range=192.168.56.50,192.168.56.150,255.255.255.0,12h
dhcp-option=option:router,192.168.56.1
dhcp-option=option:dns-server,192.168.56.10

# Logging configurations for network auditing
log-queries
log-dhcp
